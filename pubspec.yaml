name: chat_app
description: Personal Chat App

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_storage: ^13.4.2
  provider: ^6.1.5+1
  google_sign_in: ^6.2.1
  image_picker: ^1.2.2
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  firebase_database: ^12.4.2
  supabase_flutter: ^2.14.1
  flutter_image_compress: ^2.4.0
  image_cropper: ^8.1.0
  path_provider: ^2.1.5
  flutter_dotenv: ^5.2.1
  firebase_messaging: 16.3.0
  flutter_local_notifications: ^18.0.1
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env
